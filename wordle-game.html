<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle-Esque</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="favicon.png">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Similar, but not to be confused with Wordle™ (THE GAME)</h1>

      <nav>
        <a href="index.html">Back to Home</a>
      </nav>

      <p>
        Try to guess the hidden 5 letter word in 6 tries.
      </p>

      <p id="status">
        Type a word to begin.
      </p>

      <p id="timer">Time: 0s</p>
      <p id="stats">Wins: 0 | Losses: 0</p>

      <div id="board"></div>

      <div id="keyboard"></div>

      <button id="restart-btn">Restart Game</button>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
